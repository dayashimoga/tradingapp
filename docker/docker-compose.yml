# ============================================================
# TradingBot — Docker Compose Full Stack
# ============================================================
version: "3.9"

services:
  # --- Trading Bot ---
  tradingbot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: tradingbot
    restart: unless-stopped
    env_file:
      - ../.env
    volumes:
      - ../config:/app/config:ro
      - bot_data:/app/data
    ports:
      - "9090:9090"  # Prometheus metrics
    networks:
      - trading_net
    depends_on:
      - prometheus

  # --- Prometheus ---
  prometheus:
    image: prom/prometheus:latest
    container_name: tradingbot_prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9091:9090"
    networks:
      - trading_net

  # --- Grafana ---
  grafana:
    image: grafana/grafana:latest
    container_name: tradingbot_grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=tradingbot
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - trading_net
    depends_on:
      - prometheus

volumes:
  bot_data:
  prometheus_data:
  grafana_data:

networks:
  trading_net:
    driver: bridge
